version: "3.9"

# SocialConnect AI — local development compose file.
# Production: frontend → Vercel, backend → Hugging Face Spaces (separate deploy targets).
# This file is for local full-stack development only.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: socialconnect
      POSTGRES_PASSWORD: socialconnect_dev
      POSTGRES_DB: socialconnect
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socialconnect"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://socialconnect:socialconnect_dev@postgres:5432/socialconnect
      REDIS_URL: redis://redis:6379/0
    ports:
      - "7860:7860"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:7860/api/v1
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: dev-only-not-for-production
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
